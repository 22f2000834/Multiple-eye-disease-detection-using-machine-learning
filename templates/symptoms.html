<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eye Disease Detection</title>
    <link href="{{ url_for('static', filename='bulma.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='bootstrap.css') }}" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap">
    <script src="https://code.jquery.com/jquery-3.6.4.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #ffffff;
            margin: 0;
            padding: 0;
        }

        .navbar-brand {
            font-weight: bold;
            color: #fff;
        }

        .navbar-toggler-icon {
            background-color: #333;
        }

        .img-fluid {
            max-width: 100%;
            height: auto;
        }

        .section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 50px 0;
        }

        .btn-primary {
            background-color: #4CAF50;
            border-color: #4CAF50;
        }

        .btn-primary:hover {
            background-color: #45a049;
            border-color: #45a049;
        }

        .footer {
            background-color: #333;
            color: #fff;
        }

        .navbar-brand {
            font-weight: bold;
            color: #fff;
            font-size: 1.5rem;
        }

        .navbar-toggler {
            border: none;
            background-color: transparent !important;
        }

        .navbar-toggler:focus {
            outline: none;
        }

        .navbar-toggler-icon {
            background-color: #ffffff !important;
            border-radius: 2px;
        }

        .navbar-nav .nav-link {
            color: #ffffff;
            font-weight: 600;
        }

        .navbar-nav .nav-link:hover {
            color: #fff;
        }

        .navbar-collapse {
            background-color: #2D4356;
        }

        .navbar-collapse .navbar-nav {
            margin-top: 10px;
        }

        .navbar-collapse .navbar-nav .nav-item {
            margin-right: 10px;
        }

        .navbar-collapse .navbar-nav .nav-item:last-child {
            margin-right: 0;
        }

        .navbar-collapse .navbar-nav .nav-link {
            padding: 8px 15px;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        .navbar-collapse .navbar-nav .nav-link:hover {
            background-color: #20d57e;
        }

        nav.navbar {
            background-color: #2D4356;
        }

        .card {
            background-color: #fff;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin: 20px;
        }
    </style>
</head>

<body>

    <div style="background-color: #2D4356;">
        <nav class="navbar navbar-expand-lg" style="background-color: #2D4356;">
            <div class="container">
                <a class="navbar-brand" href="#">
                    <span style="margin-right: 10px"></span>Eye Disease Detection
                </a>
                <div class="collapse navbar-collapse justify-content-end" id="navbarSupportedContent">
                    <ul class="navbar-nav mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link" href="/faq">FAQ</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/">Home</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </div>


    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">

                    <form id="eyeDiseaseForm" method="post" enctype="multipart/form-data" action="{{ url_for('upload_image') }}">

                        <div class="form-group">
                            <label for="blurredVision"><b>1. Do you have blurred or cloudy vision?</b></label>
                            <div class="custom-control custom-radio">
                                <input type="radio" id="blurredVisionYes" name="blurredVision" class="custom-control-input">
                                <label class="custom-control-label" for="blurredVisionYes">Yes</label>
                            </div>
                            <div class="custom-control custom-radio">
                                <input type="radio" id="blurredVisionNo" name="blurredVision" class="custom-control-input">
                                <label class="custom-control-label" for="blurredVisionNo">No</label>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="halosAroundLights"><b>2. Do you see "halos" around lights?</b></label>
                            <div class="custom-control custom-radio">
                                <input type="radio" id="halosAroundLightsYes" name="halosAroundLights" class="custom-control-input">
                                <label class="custom-control-label" for="halosAroundLightsYes">Yes</label>
                            </div>
                            <div class="custom-control custom-radio">
                                <input type="radio" id="halosAroundLightsNo" name="halosAroundLights" class="custom-control-input">
                                <label class="custom-control-label" for="halosAroundLightsNo">No</label>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="fluctuatingVision"><b>3. Do you experience fluctuating vision?</b></label>
                            <div class="custom-control custom-radio">
                                <input type="radio" id="fluctuatingVisionYes" name="fluctuatingVision" class="custom-control-input">
                                <label class="custom-control-label" for="fluctuatingVisionYes">Yes</label>
                            </div>
                            <div class="custom-control custom-radio">
                                <input type="radio" id="fluctuatingVisionNo" name="fluctuatingVision" class="custom-control-input">
                                <label class="custom-control-label" for="fluctuatingVisionNo">No</label>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="darkSpotsFloaters"><b>4. Do you see dark spots/floaters in your vision?</b></label>
                            <div class="custom-control custom-radio">
                                <input type="radio" id="darkSpotsFloatersYes" name="darkSpotsFloaters" class="custom-control-input">
                                <label class="custom-control-label" for="darkSpotsFloatersYes">Yes</label>
                            </div>
                            <div class="custom-control custom-radio">
                                <input type="radio" id="darkSpotsFloatersNo" name="darkSpotsFloaters" class="custom-control-input">
                                <label class="custom-control-label" for="darkSpotsFloatersNo">No</label>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="gradualPeripheralVisionLoss"><b>5. Have you noticed gradual peripheral vision loss?</b></label>
                            <div class="custom-control custom-radio">
                                <input type="radio" id="gradualPeripheralVisionLossYes" name="gradualPeripheralVisionLoss" class="custom-control-input">
                                <label class="custom-control-label" for="gradualPeripheralVisionLossYes">Yes</label>
                            </div>
                            <div class="custom-control custom-radio">
                                <input type="radio" id="gradualPeripheralVisionLossNo" name="gradualPeripheralVisionLoss" class="custom-control-input">
                                <label class="custom-control-label" for="gradualPeripheralVisionLossNo">No</label>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="severeEyePain"><b>6. Do you experience severe eye pain?</b></label>
                            <div class="custom-control custom-radio">
                                <input type="radio" id="severeEyePainYes" name="severeEyePain" class="custom-control-input">
                                <label class="custom-control-label" for="severeEyePainYes">Yes</label>
                            </div>
                            <div class="custom-control custom-radio">
                                <input type="radio" id="severeEyePainNo" name="severeEyePain" class="custom-control-input">
                                <label class="custom-control-label" for="severeEyePainNo">No</label>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="uploadImage">Upload an image</label>
                            <div class="custom-file">
                                <input type="file" class="custom-file-input" id="uploadImage" name="file" accept="image/*" onchange="updateFileName(this)">
                                <label class="custom-file-label" for="uploadImage">Choose file</label>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary">Submit</button>

                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        function updateFileName(input) {
            var fileName = input.files[0].name;
            input.nextElementSibling.innerText = fileName;
        }
    </script>

</body>

</html>
