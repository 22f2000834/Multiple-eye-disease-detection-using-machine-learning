<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnosis</title>
    <!-- Link to your CSS file -->
    <link href="{{ url_for('static', filename='styles.css') }}" rel="stylesheet">
    <!-- Link to Bootstrap CSS -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <!-- Link to Google Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap">
    <style>
        /* Custom CSS can be added here if necessary */
    </style>
</head>
<style>
    body {
        font-family: 'Montserrat', sans-serif;
        background-color: #f5f5f5;
        color: #333;
        margin: 0;
        padding: 0;
    }

    .navbar {
        background-color: #2D4356;
    }

    .navbar-brand {
        font-weight: bold;
        color: #fff;
        font-size: 1.8rem;
    }

    .navbar-toggler {
        border: none;
        background-color: transparent !important;
    }

    .navbar-toggler:focus {
        outline: none;
    }

    .navbar-toggler-icon {
        background-color: #ffffff !important;
        border-radius: 2px;
    }

    .navbar-nav .nav-link {
        color: #ffffff;
        font-weight: 600;
    }

    .navbar-nav .nav-link:hover {
        color: #d62828; /* Changed hover color */
    }

    .navbar-collapse {
        background-color: #2D4356;
    }

    .container-fluid {
        min-height: 100vh;
        overflow-y: auto; /* Enable vertical scrolling */
        display: flex;
        justify-content: center;
        align-items: center;
        margin-top: -60px;
    }

    .image-section {
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .image-section img {
        width: 70%; /* Adjusted image width */
        max-height: 60%; /* Ensure image maintains aspect ratio */
        border-radius: 100px; /* Increased border radius for more curvature */
    }

    .diagnosis-info {
        padding: 40px;
        background-color: #fff;
        border-radius: 20px;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        margin: 20px; /* Adjusted margin */
        text-align: center;
        font-family: 'Arial', sans-serif; /* Changed font to Arial */
    }

    .diagnosis-info h2 {
        color: #003049;
        font-size: 2.5rem;
        margin-bottom: 30px;
    }

    .progress-bar {
        background-color: #2a9d8f; /* Changed progress bar color */
    }

    .description {
        margin-top: 20px;
    }

    .description h5 {
        color: #003049;
        font-size: 1.5rem;
        margin-bottom: 10px;
    }

    .btn-custom {
        background-color: #f4a261;
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 12px 24px;
        font-size: 1.2rem;
        font-weight: 600;
        cursor: pointer;
        transition: background-color 0.3s ease;
    }

    .btn-custom:hover {
        background-color: #e76f51;
    }

    .btn-navbar {
        background-color: #2D4356;
        color: #fff;
        border-radius: 8px;
        padding: 10px 20px;
        font-size: 1rem;
        font-weight: 600;
        margin-left: 20px;
        transition: background-color 0.3s ease;
    }

    .btn-navbar:hover {
        background-color: #d62828;
    }

    .footer {
        background-color: #2D4356;
        color: #fff;
        padding: 20px 0;
        text-align: center;
        position: fixed;
        bottom: 0;
        width: 100%;
    }
</style>


<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="fas fa-eye"></i> Eye Disease Detection
            </a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent"
                aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav ml-auto">
                    <li class="nav-item">
                        <a  href="/faq" class="btn btn-navbar">FAQ</a>
                    </li>
                    <li class="nav-item">
                        <a  href="/" class="btn btn-navbar">HOME</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <!-- End Navigation Bar -->

    <!-- Main Content Section -->
    <div class="container-fluid">
        <div class="row">
            <div class="col-lg-6">
                <!-- Image Section -->
                <div class="image-section text-center">
                    <img src="{{ url_for('static', filename=image_path) }}" alt="Diagnosis Image" class="img-fluid" style="border-radius: 40px;">
                </div>
            </div>
            <div class="col-lg-6">
                <!-- Diagnosis Info Section -->
                <div class="diagnosis-info">
                    <h2 class="text-center">Diagnosis Result</h2>
                    <div class="progress">
                        <div class="progress-bar bg-success" role="progressbar" style="width: {{ probability }}%;"
                            aria-valuenow="{{ probability }}" aria-valuemin="0" aria-valuemax="100">{{ probability }}%</div>
                    </div>
                    <h4 class="text-center mt-4 bold">{{ predicted_class }}</h4>
                    <div class="description mt-4">
                        <p>{{ disease_description|safe }}</p>
                    </div>
                    <div class="text-center mt-4">
                        <a href="https://www.google.com/search?q={{ predicted_class }} disease" class="btn btn-custom btn-lg">Learn More</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- End Main Content Section -->

    <!-- Footer Section -->
    <footer class="footer">
        <div class="container">
            <div class="row">
                <div class="col-lg-12 text-center">
                    <p>&copy; 2024 Eye Disease Detection. All rights reserved.</p>
                </div>
            </div>
        </div>
    </footer>
    <!-- End Footer Section -->

    <!-- JavaScript Links -->
    <script src="https://kit.fontawesome.com/a076d05399.js"></script>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.1/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>

</html>
